version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hotel_postgres
    restart: always
    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-test-db.sh:/docker-entrypoint-initdb.d/01-init-test-db.sh:ro
      - ./scripts/init-exporter-user.sh:/docker-entrypoint-initdb.d/02-init-exporter-user.sh:ro

  migrations:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: hotel_migrations
    depends_on:
      - postgres
    env_file: .env
    environment:
      - MAIN_DB_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - TEST_DB_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}_test?sslmode=disable
    volumes:
      - ./migrations:/app/migrations:ro
      - ./scripts:/app/scripts:ro
      - ./seeds:/app/seeds:ro

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: hotel_postgres_exporter
    restart: always
    depends_on:
      - postgres
    environment:
      - DATA_SOURCE_NAME=postgresql://exporter:exporter_pass@postgres:5432/hotel_booking?sslmode=disable
    ports:
      - "9187:9187"

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: hotel_prometheus
    restart: always
    depends_on:
      - postgres_exporter
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:10.4.0
    container_name: hotel_grafana
    restart: always
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  pgdata:
  prometheus_data:
  grafana_data:

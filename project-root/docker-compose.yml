version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hotel_postgres
    restart: always
    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro

  migrations:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: hotel_migrations
    depends_on:
      - postgres
    env_file: .env
    environment:
      - MAIN_DB_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - TEST_DB_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}_test?sslmode=disable
    volumes:
      - ./migrations:/app/migrations:ro
      - ./scripts:/app/scripts:ro
      - ./seeds:/app/seeds:ro

volumes:
  pgdata:
